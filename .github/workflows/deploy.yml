name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: bulk_upload_usability_fixes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bulk_upload_usability_fixes/package-lock.json

      - run: npm ci

      - run: npx vite build
        env:
          VITE_ENABLE_ROUTE_MESSAGING: "false"

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./bulk_upload_usability_fixes/dist
